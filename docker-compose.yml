services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kestra:
    image: kestra/kestra:latest
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    command: server standalone
    user: "root"
    volumes:
      - ./flows:/app/flows
      - ./:/workspace
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra

        kestra:
          repository:
            type: postgres

          queue:
            type: postgres

          storage:
            type: local
            local:
              base-path: /app/storage

volumes:
  postgres-data: